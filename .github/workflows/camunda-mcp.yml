name: Camunda MCP

# Runs Claude Code with the Camunda MCP server (defined in the repo-root
# .mcp.json). The credentials the MCP server needs are NOT stored in the repo:
# they live in GitHub Actions secrets and are injected here as environment
# variables. The ${VAR} placeholders in .mcp.json are expanded from these at
# load time, so the config file itself never contains a real secret.
#
# Add the secrets once (Repo → Settings → Secrets and variables → Actions):
#   CAMUNDA_BASE_URL        e.g. https://sin-1.zeebe.camunda.io/<cluster-id>
#   CAMUNDA_CLIENT_ID
#   CAMUNDA_CLIENT_SECRET
#   CAMUNDA_OAUTH_URL       e.g. https://login.cloud.camunda.io/oauth/token
#   CAMUNDA_TOKEN_AUDIENCE  e.g. zeebe.camunda.io
# plus ANTHROPIC_API_KEY for the Claude Code action.

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for Claude Code"
        required: true
        default: "List the deployed process definitions in the cluster."

jobs:
  camunda-mcp:
    runs-on: ubuntu-latest
    # Secrets -> environment variables. .mcp.json reads these via ${VAR}.
    env:
      CAMUNDA_BASE_URL: ${{ secrets.CAMUNDA_BASE_URL }}
      CAMUNDA_CLIENT_ID: ${{ secrets.CAMUNDA_CLIENT_ID }}
      CAMUNDA_CLIENT_SECRET: ${{ secrets.CAMUNDA_CLIENT_SECRET }}
      CAMUNDA_OAUTH_URL: ${{ secrets.CAMUNDA_OAUTH_URL }}
      CAMUNDA_TOKEN_AUDIENCE: ${{ secrets.CAMUNDA_TOKEN_AUDIENCE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Claude Code with Camunda MCP
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ inputs.prompt }}
          # .mcp.json at the repo root is picked up automatically; the env
          # block above supplies the secrets its ${VAR} placeholders reference.
